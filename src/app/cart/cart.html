<h3>Your Cart</h3>

<table class="table" *ngIf="cart.length > 0">
  <tr>
    <th>Name</th>
    <th>Qty</th>
    <th>Price</th>
    <th>Total</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let item of cart; let i = index">
    <td>{{item.name}}</td>
    <td>{{item.qty}}</td>
    <td>{{item.price}}</td>
    <td>{{item.price * item.qty}}</td>
    <td>
      <button class="btn btn-danger btn-sm" (click)="removeItem(i)">Remove</button>
    </td>
  </tr>
</table>

<h4>Total: ₹ {{total}}</h4>

<button class="btn btn-warning" (click)="goToCheckout()" *ngIf="cart.length > 0">
  Proceed to Checkout
</button>

<p *ngIf="cart.length === 0">Cart is empty</p>
